name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check src
      - run: pytest -q

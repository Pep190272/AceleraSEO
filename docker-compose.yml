# ─────────────────────────────────────────────────────────────
# AceleraSEO — one-command self-host.
#   cp .env.example .env   # fill in your keys
#   docker compose up
# Engine API → http://localhost:8000  (docs at /docs)
# ─────────────────────────────────────────────────────────────
services:
  engine:
    build:
      context: ./apps/engine
      dockerfile: Dockerfile
    image: aceleraseo/engine:latest
    container_name: aceleraseo-engine
    env_file:
      - .env
    environment:
      # SQLite lives on the mounted volume so data survives restarts.
      DATABASE_URL: sqlite:////app/data/aceleraseo.db
      GOOGLE_TOKEN_FILE: /app/data/gsc-token.json
      APP_PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - aceleraseo-data:/app/data
    restart: unless-stopped

volumes:
  aceleraseo-data:
